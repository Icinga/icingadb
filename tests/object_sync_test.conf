{{range .GenericPrefixes}}
object CheckCommand "{{.}}-checkcommand" {
	command = ["true"]
}

object EventCommand "{{.}}-eventcommand" {
	command = ["true"]
}

object NotificationCommand "{{.}}-notificationcommand" {
	command = ["true"]
}

object Endpoint "{{.}}-endpoint" {}

object Zone "{{.}}-zone" {
	parent = "master"
	endpoints = ["{{.}}-endpoint"]
}

object Host "{{.}}-host" {
	check_command = "hostalive"
}

object HostGroup "{{.}}-hostgroup" {}

object Service "{{.}}-service" {
	host_name = "{{.}}-host"
	check_command = "dummy"
}

object ServiceGroup "{{.}}-servicegroup" {}

object TimePeriod "{{.}}-timeperiod" {}

object User "{{.}}-user" {}

object UserGroup "{{.}}-usergroup" {}
{{end}}

{{range .NotificationUserGroups}}
object UserGroup "{{.}}" {
}
{{end}}

{{range $user, $groups := .NotificationUsers}}
object User "{{$user}}" {
  groups = [
    {{range $group, $_ := $groups}}
    "{{$group}}",
    {{end}}
  ]
}
{{end}}

globals.randomizer = function() { return random() }
globals.make_dependencies = function(parent, child, ignoreSoftStates, statesFilter, timeperiod, redundancyGroup) {
	object Dependency "dependency"+randomizer() use(parent, child, ignoreSoftStates, statesFilter, timeperiod, redundancyGroup) {
		parent_host_name = parent
		child_host_name = child
		ignore_soft_states = ignoreSoftStates
		states = statesFilter
		period = timeperiod
		redundancy_group = redundancyGroup
	}
}

object TimePeriod "workhours" {
    ranges = {}
}

object TimePeriod "never-ever" {
    ranges = {}
}

template Host "dependency-host-template" {
	check_command = "dummy"
	max_check_attempts = 1
	check_interval = 300s
	vars.dummy_text = "I'm just testing something"
	vars.dummy_state = 0
}

for (suffix in ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L", "M", "N"]) {
	object Host "Host"+suffix {
		import "dependency-host-template"
	}
}

{{range $dependencyGroup := .DependencyGroups}}
	{{range $parent := .Parents}}
		{{range $child := $dependencyGroup.Children}}
			make_dependencies("{{$parent}}", "{{$child}}", {{$dependencyGroup.IgnoreSoftStates}}, [ {{NaturalJoin $dependencyGroup.StatesFilter ", "}} ], "{{$dependencyGroup.TimePeriod}}", "{{$dependencyGroup.Name}}")
		{{end}}
	{{end}}
{{end}}
